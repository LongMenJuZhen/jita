<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jita - Settings</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-primary: #0f0f0f;
        --bg-secondary: #1a1a1a;
        --bg-tertiary: #252525;
        --bg-hover: #2a2a2a;
        --accent: #6366f1;
        --accent-hover: #818cf8;
        --accent-glow: rgba(99, 102, 241, 0.3);
        --text-primary: #ffffff;
        --text-secondary: #a1a1aa;
        --text-muted: #71717a;
        --border: #3f3f46;
        --border-subtle: #27272a;
        --radius: 12px;
        --radius-sm: 8px;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        color: var(--text-primary);
        background: var(--bg-primary);
        padding: 20px;
        min-height: 100vh;
      }

      .settings-panel {
        max-width: 500px;
        margin: 0 auto;
        padding: 24px;
        background: var(--bg-secondary);
        border-radius: var(--radius);
        border: 1px solid var(--border-subtle);
      }

      .settings-panel h2 {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 24px;
        color: var(--text-primary);
      }

      .settings-row {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 20px;
      }

      .settings-row label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-secondary);
      }

      .settings-row input {
        padding: 12px 14px;
        background: var(--bg-primary);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 14px;
        color: var(--text-primary);
        outline: none;
        transition: all 0.2s ease;
        width: 100%;
      }

      .settings-row input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      .language-selector {
        display: flex;
        gap: 8px;
      }

      .lang-btn {
        padding: 8px 16px;
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text-secondary);
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .lang-btn:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
      }

      .lang-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }

      .input-with-btn {
        display: flex;
        gap: 8px;
      }

      .input-with-btn input {
        flex: 1;
      }

      .settings-btn {
        padding: 8px 16px;
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text-secondary);
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s ease;
        white-space: nowrap;
      }

      .settings-btn:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
      }

      .settings-actions {
        display: flex;
        gap: 12px;
        margin-top: 24px;
      }

      .settings-actions button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: var(--radius-sm);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .save {
        background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
        color: white;
      }

      .save:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 20px var(--accent-glow);
      }

      .cancel {
        background: var(--bg-tertiary);
        color: var(--text-secondary);
      }

      .cancel:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
      }

      .toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 24px;
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 14px;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .toast.show {
        opacity: 1;
      }

      .toast.success {
        border-color: #22c55e;
        color: #22c55e;
      }

      .toast.error {
        border-color: #ef4444;
        color: #ef4444;
      }
    </style>
  </head>
  <body>
    <div class="settings-panel">
      <h2 id="title">Settings</h2>

      <div class="settings-row">
        <label id="lang-label">Language</label>
        <div class="language-selector">
          <button class="lang-btn active" data-lang="zh">简体中文</button>
          <button class="lang-btn" data-lang="en">English</button>
          <button class="lang-btn" data-lang="ja">日本語</button>
        </div>
      </div>

      <div class="settings-row">
        <label id="api-key-label">API Key</label>
        <input type="password" id="api-key" />
      </div>

      <div class="settings-row">
        <label id="api-base-label">API Base URL</label>
        <input type="text" id="api-base" placeholder="Optional" />
      </div>

      <div class="settings-row">
        <label id="model-label">Model</label>
        <input type="text" id="model" />
      </div>

      <div class="settings-row">
        <label id="asr-model-label">ASR Model Path</label>
        <div class="input-with-btn">
          <input type="text" id="asr-model" readonly placeholder="Click Open to set" />
          <button class="settings-btn" id="open-folder">📁 Open</button>
        </div>
      </div>

      <div class="settings-actions">
        <button class="save" id="save">💾 Save</button>
        <button class="cancel" id="cancel">Cancel</button>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module">
      import { invoke } from 'https://unpkg.com/@tauri-apps/api@2.0.0/core/dist/window.mjs';

      const translations = {
        zh: {
          title: '设置',
          'lang-label': '语言',
          'api-key-label': 'API Key',
          'api-base-label': 'API Base URL',
          'model-label': '模型',
          'asr-model-label': 'ASR 模型路径',
          save: '保存',
          cancel: '取消',
        },
        en: {
          title: 'Settings',
          'lang-label': 'Language',
          'api-key-label': 'API Key',
          'api-base-label': 'API Base URL',
          'model-label': 'Model',
          'asr-model-label': 'ASR Model Path',
          save: 'Save',
          cancel: 'Cancel',
        },
        ja: {
          title: '設定',
          'lang-label': '言語',
          'api-key-label': 'API Key',
          'api-base-label': 'API Base URL',
          'model-label': 'モデル',
          'asr-model-label': 'ASR モデルパス',
          save: '保存',
          cancel: 'キャンセル',
        }
      };

      let currentLang = localStorage.getItem('i18nextLng') || 'zh';
      const settings = {
        api_key: '',
        api_base: '',
        model: 'claude-sonnet-4-6',
        asr_model_path: ''
      };

      // Translation
      function updateLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('i18nextLng', lang);

        document.querySelectorAll('[id]').forEach(el => {
          const id = el.id.replace('lang-', '');
          if (translations[lang][id]) {
            el.textContent = translations[lang][id];
          }
        });

        document.querySelectorAll('.lang-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.lang === lang);
        });
      }

      // Show toast
      function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `toast show ${type}`;
        setTimeout(() => toast.classList.remove('show'), 2000);
      }

      // Load settings
      async function loadSettings() {
        try {
          const result = await invoke('get_settings');
          if (result) {
            settings.api_key = result.api_key || '';
            settings.api_base = result.api_base || '';
            settings.model = result.model || 'claude-sonnet-4-6';

            document.getElementById('api-key').value = settings.api_key;
            document.getElementById('api-base').value = settings.api_base;
            document.getElementById('model').value = settings.model;
          }
        } catch (e) {
          console.error('Failed to load settings:', e);
        }
      }

      // Save settings
      async function saveSettings() {
        try {
          const data = {
            api_key: document.getElementById('api-key').value,
            api_base: document.getElementById('api-base').value || undefined,
            model: document.getElementById('model').value,
            hotkey: 'ctrl+space',
            asr_enabled: true,
            asr_model_path: undefined
          };

          await invoke('save_settings', { settings: data });
          showToast(translations[currentLang].success || 'Success');
          setTimeout(() => window.close(), 500);
        } catch (e) {
          console.error('Failed to save:', e);
          showToast('Error: ' + e, 'error');
        }
      }

      // Open models folder
      async function openModelsFolder() {
        try {
          await invoke('open_models_folder');
        } catch (e) {
          console.error('Failed to open folder:', e);
        }
      }

      // Event listeners
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => updateLanguage(btn.dataset.lang));
      });

      document.getElementById('save').addEventListener('click', saveSettings);
      document.getElementById('cancel').addEventListener('click', () => window.close());
      document.getElementById('open-folder').addEventListener('click', openModelsFolder);

      // Init
      updateLanguage(currentLang);
      loadSettings();
    </script>
  </body>
</html>
